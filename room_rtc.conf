# RoomRTC Configuration File

[network]
# IP address to bind sockets to. 0.0.0.0 means all available interfaces.
bind_address = "0.0.0.0"

[media]
# Camera device index (0 is usually the default webcam)
camera_index = 0
frame_width = 640.0
frame_height = 480.0
frame_rate = 30
# How often to send a full keyframe (IDR frame)
h264_idr_interval = 15
# Max size for one RTP payload chunk (to avoid UDP fragmentation)
rtp_max_chunk_size = 1200
# Default SSRC (Synchronization Source) identifier
default_ssrc = 42
# Codec details
rtp_payload_type = 111
codec_name = "H264"
clock_rate = 48000

[rtcp]
# How often to send RTCP connectivity reports
report_period_millis = 1000
# How long to wait for a report before timing out
receive_limit_millis = 3000
# Number of missed reports before closing connection
retry_limit = 5
