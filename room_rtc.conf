# RoomRTC Configuration File

[network]
# IP address to bind sockets to. 0.0.0.0 means all available interfaces.
bind_address = "0.0.0.0"
# Max UDP packet size for receiver buffer
max_udp_packet_size = 1200

[media]
# Camera device index (0 is usually the default webcam)
camera_index = 0
frame_width = 640.0
frame_height = 480.0
frame_rate = 30
# How often to send a full keyframe (IDR frame)
h264_idr_interval = 15
# Max size for one RTP payload chunk (to avoid UDP fragmentation)
rtp_max_chunk_size = 1200
# Default SSRC (Synchronization Source) identifier
default_ssrc = 42
# Codec details
rtp_payload_type = 111
codec_name = "H264"
clock_rate = 48000
# RTP packet version
rtp_version = 2
# SDP media line defaults
media_type = "video"
media_protocol = "RTP/AVP"

[rtcp]
# How often to send RTCP connectivity reports
report_period_millis = 1000
# How long to wait for a report before timing out
receive_limit_millis = 3000
# Number of missed reports before closing connection
retry_limit = 5

[rtp]
# Socket read timeout in milliseconds
read_timeout_millis = 3000
# RtpPacket max size supported
max_packet_size = 1200

# SDP default session-level values
[sdp]
version = 0
origin_id = 0
session_name = "-"
timing = "0 0"
connection_data_net_type = "IN"
connection_data_addr_type = "IP4"
connection_data_address = "0.0.0.0"

# ICE default candidate values
[ice]
foundation = "1"
transport = "UDP"
component_id = 1
# RFC 8445 priority preferences
host_priority_preference = 126
srflx_priority_preference = 100
host_local_preference = 65535
